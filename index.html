[<title="修复版云计算技术应用专业欢迎页面">]
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>欢迎报考 - 云计算技术应用专业</title>
<style>
{
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
background-color: #000;
overflow: hidden;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
font-family: 'Courier New', monospace, sans-serif; / 增加 fallback /
position: relative;
}

#particles-canvas {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: 1;
}

canvas#matrix {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: 2;
pointer-events: none;
}

.container {
text-align: center;
z-index: 3;
perspective: 1000px;
padding: 20px;
max-width: 90%;
}

.logo {
width: 400px;
height: auto;
margin-bottom: 30px;
filter: drop-shadow(0 0 15px rgba(0, 200, 255, 0.7));
animation: floatLogo 6s infinite alternate;
}

@keyframes floatLogo {
0% { transform: translateY(0) rotateX(0); }
100% { transform: translateY(-10px) rotateX(5deg); }
}

h1 {
font-size: 2.6rem;
letter-spacing: 0.2em;
text-transform: uppercase;
transform-style: preserve-3d;
animation: float3d 8s infinite alternate ease-in-out;
transition: all 0.4s ease;
cursor: default;
/ 确保文字在所有浏览器中可选中/渲染 /
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
color: #00f0ff;
text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff, 0 0 30px rgba(0, 200, 255, 0.8), 0 0 40px #00f0ff;
}

@keyframes float3d {
0% {
transform: rotateX(-15deg) rotateY(10deg) translateZ(0);
}
100% {
transform: rotateX(15deg) rotateY(-10deg) translateZ(30px);
}
}

@media (max-width: 768px) {
.logo {
width: 250px;
}
h1 {
font-size: 1.8rem;
letter-spacing: 0.1em;
}
}
</style>
</head>
<body>
<div id="particles-canvas"></div>
<canvas id="matrix"></canvas>

<div class="container">
<img src="https://via.placeholder.com/400x200/00aaff/ffffff?text=郑州理工职业学院" alt="郑州理工职业学院" class="logo" />
<h1 id="dynamic-title">欢迎报考郑州理工职业学院云计算技术应用专业</h1>
</div>

<!-- 使用Three.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ========== WebGL 兼容性检测 ==========
function isWebGLSupported() {
try {
var canvas = document.createElement('canvas');
return !!(window.WebGLRenderingContext &&
(canvas.getContext('webgl') canvas.getContext('experimental-webgl')));
} catch (e) {
return false;
}
}

// ========== Three.js 粒子背景（仅当支持 WebGL 时运行） ==========
if (isWebGLSupported()) {
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('particles-canvas').appendChild(renderer.domElement);

const particleCount = 1200;
const particlesGeometry = new THREE.BufferGeometry();
const posArray = new Float32Array(particleCount 3);
const colorArray = new Float32Array(particleCount 3);

for (let i = 0; i < particleCount 3; i += 3) {
const radius = 20 + Math.random() 60;
const theta = Math.random() Math.PI 2;
const phi = Math.acos(2 Math.random() - 1);
posArray[i] = radius Math.sin(phi) Math.cos(theta);
posArray[i + 1] = radius Math.sin(phi) Math.sin(theta);
posArray[i + 2] = radius Math.cos(phi);

colorArray[i] = 0.1 + Math.random() 0.2;
colorArray[i + 1] = 0.4 + Math.random() 0.4;
colorArray[i + 2] = 0.7 + Math.random() 0.3;
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

const material = new THREE.PointsMaterial({
size: 1.2,
vertexColors: true,
transparent: true,
opacity: 0.85,
blending: THREE.AdditiveBlending
});

const particlesMesh = new THREE.Points(particlesGeometry, material);
scene.add(particlesMesh);
camera.position.z = 100;

// 简化连线（性能优化）
const linesGeometry = new THREE.BufferGeometry();
const linePositions = [];
const positions = particlesGeometry.attributes.position.array;

for (let i = 0; i < particleCount; i++) {
const x1 = positions[i 3];
const y1 = positions[i 3 + 1];
const z1 = positions[i 3 + 2];
for (let j = i + 1; j < Math.min(i + 8, particleCount); j++) {
const dx = x1 - positions[j 3];
const dy = y1 - positions[j 3 + 1];
const dz = z1 - positions[j 3 + 2];
const dist = Math.sqrt(dx dx + dy dy + dz dz);
if (dist < 25) {
linePositions.push(x1, y1, z1, positions[j 3], positions[j 3 + 1], positions[j 3 + 2]);
}
}
}

if (linePositions.length > 0) {
linesGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
const lineMaterial = new THREE.LineBasicMaterial({
color: 0x00aaff,
transparent: true,
opacity: 0.15
});
const lines = new THREE.LineSegments(linesGeometry, lineMaterial);
scene.add(lines);
}

function animate() {
requestAnimationFrame(animate);
const time = Date.now() 0.0005;
particlesMesh.rotation.y = time 0.3;
if (lines) lines.rotation.y = particlesMesh.rotation.y;
renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});
}

// ========== 蓝色代码雨（Canvas，所有现代浏览器支持） ==========
const matrixCanvas = document.getElementById('matrix');
const ctx = matrixCanvas.getContext('2d', { alpha: false }); // 提升性能

function resizeMatrix() {
matrixCanvas.width = window.innerWidth;
matrixCanvas.height = window.innerHeight;
// Firefox 字体渲染优化
ctx.font = '14px "Courier New", monospace';
}

window.addEventListener('resize', resizeMatrix);
resizeMatrix();

const chars = "01abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ云计科算郑州理工职院欢迎报考";
const charArray = chars.split('');
const fontSize = 14;
const columns = Math.floor(matrixCanvas.width / fontSize);
const drops = Array.from({ length: columns }, () => Math.random() -matrixCanvas.height / fontSize);

function drawMatrix() {
ctx.fillStyle = 'rgba(0, 10, 30, 0.04)';
ctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);

// 显式设置字体（解决 Firefox 字体模糊）
ctx.font = ${fontSize}px "Courier New", monospace;
ctx.textAlign = 'center';

for (let i = 0; i < drops.length; i++) {
const text = charArray[Math.floor(Math.random() charArray.length)];
ctx.fillStyle = Math.random() > 0.97 ? '#00f0ff' : '#0066cc';
ctx.fillText(text, i fontSize, drops[i] fontSize);
if (drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) {
drops[i] = 0;
}
drops[i]++;
}

requestAnimationFrame(drawMatrix);
}

// 安全启动动画
if (typeof requestAnimationFrame === 'function') {
drawMatrix();
} else {
// 极老浏览器 fallback（实际不会触发）
setInterval(drawMatrix, 50);
}

// ========== 动态标题 + 鼠标交互 ==========
// 移除可能导致问题的动态标题动画，使用CSS动画
const title = document.getElementById('dynamic-title');

title.addEventListener('mouseenter', () => {
title.style.textShadow =
0 0 20px #ffffff,
0 0 30px #00f0ff,
0 0 40px #00bfff,
0 0 60px #0088ff,
0 0 80px #0066ff
;
title.style.transform = 'scale(1.05) rotateX(5deg)';
});

title.addEventListener('mouseleave', () => {
title.style.transform = '';
title.style.textShadow = '0 0 10px #00f0ff, 0 0 20px #00f0ff, 0 0 30px rgba(0, 200, 255, 0.8), 0 0 40px #00f0ff';
});
</script>
</body>
</html>
</title>
